# Development only. Production uses nginx + docker compose deploy config.
services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: reparilo
      POSTGRES_PASSWORD: reparilo_secret
      POSTGRES_DB: reparilo
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reparilo"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
