name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    name: Lint, typecheck, test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: reparilo
          POSTGRES_PASSWORD: reparilo_test
          POSTGRES_DB: reparilo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://reparilo:reparilo_test@localhost:5432/reparilo_test
      BETTER_AUTH_SECRET: test-secret-at-least-thirty-two-chars-long-aaaa
      AI_ENCRYPTION_KEY: test-aes-key-at-least-thirty-two-chars-ok-bbbb
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bun run db:generate

      - name: Apply migrations
        run: bun run db:migrate-deploy

      - name: Lint
        run: bun run check

      - name: Typecheck
        run: bunx tsc --noEmit

      - name: Test
        run: bun run test
