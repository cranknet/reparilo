name: Bug report
description: Report a defect in Reparilo
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill in as much as you can — vague reports are hard to act on and often get closed without a fix.

        **If this is a security issue, do not file it here.** Use [GitHub Security Advisories](https://github.com/cranknet/reparilo/security/advisories/new) or email `security@reparilo.shop`.

  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: A clear, concise description of the bug.
      placeholder: When I click "Save" on a new job, the page reloads but the job isn't created.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Numbered steps from a clean state. The clearer these are, the faster a fix is possible.
      placeholder: |
        1. Sign in as admin
        2. Go to /jobs/new
        3. Fill in customer + device
        4. Click Save
        5. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: What actually happened?
      description: Include error messages, screenshots, or short clips if relevant.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version / commit SHA
      description: Output of `git rev-parse --short HEAD` or the release tag.
      placeholder: e.g. v1.0.0 or a707d72
    validations:
      required: true

  - type: dropdown
    id: surface
    attributes:
      label: Where did this happen?
      multiple: true
      options:
        - Web (browser)
        - Android (Capacitor)
        - Server / API
        - Database / migrations
        - CLI / scripts
        - Not sure
    validations:
      required: true

  - type: dropdown
    id: locale
    attributes:
      label: Locale in use
      multiple: true
      options:
        - English (en)
        - French (fr)
        - Arabic (ar)
        - Not sure / not relevant
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser + version, OS, Android version (if mobile), Node/Bun version, Postgres version.
      placeholder: |
        - Browser: Chrome 130
        - OS: macOS 14.5
        - Bun: 1.3.13
        - Postgres: 16.4

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Server logs, browser console errors, or stack traces. **Redact any secrets, tokens, or customer data first.**
      render: shell

  - type: checkboxes
    id: terms
    attributes:
      label: Checks before submitting
      options:
        - label: I've searched existing issues and this isn't a duplicate.
          required: true
        - label: This is not a security vulnerability (those go to SECURITY.md).
          required: true
        - label: I've redacted any secrets, tokens, or customer data from logs and screenshots.
          required: true
