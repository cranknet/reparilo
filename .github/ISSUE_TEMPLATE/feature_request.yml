name: Feature request
description: Propose a new feature or enhancement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for thinking about how to improve Reparilo. Before filing, please skim the README's "scope" guidance — Reparilo is intentionally a **single-tenant, single-location** repair-shop tool. Features that push it toward multi-tenant SaaS or generic ERP territory will likely be declined.

        Filing a request doesn't guarantee it will be built. The maintainer is solo and prioritises tightly.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the user pain or workflow gap. Start with the problem, not the solution.
      placeholder: When a customer returns for a follow-up repair, I can't easily see the history of past jobs for the same device.
    validations:
      required: true

  - type: textarea
    id: who
    attributes:
      label: Who experiences this problem?
      description: Shop owner? Technician? Customer? How often does it come up?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see? Mockups, sketches, or rough flows are welcome but not required.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: Workarounds you're using today, or other approaches you thought about and rejected.

  - type: textarea
    id: scope
    attributes:
      label: Scope check
      description: Why does this fit a single-location repair shop, vs. a multi-tenant or industry-agnostic tool?
    validations:
      required: true

  - type: checkboxes
    id: terms
    attributes:
      label: Checks before submitting
      options:
        - label: I've searched existing issues and discussions for this idea.
          required: true
        - label: I've read the contributing guide and understand requests may be declined to keep scope focused.
          required: true
