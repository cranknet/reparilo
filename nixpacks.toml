providers = ["node"]

[phases.setup]
nixPkgs = ["nodejs_22", "openssl", "unzip"]
cmds = ["curl -fsSL https://bun.sh/install | bash"]

[phases.install]
cmds = ["~/.bun/bin/bun install --frozen-lockfile"]

[phases.build]
cmds = ["~/.bun/bin/bun run build"]

[start]
cmd = "~/.bun/bin/bun run start:prod"